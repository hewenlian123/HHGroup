# CI: Vitest + Prettier + ESLint (unit tests) + Build + production deploy to Vercel (main only).
# E2E (Playwright) runs locally only — not in this workflow.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Optional: vars.NEXT_PUBLIC_SUPABASE_URL, secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY (for next build if needed)
# Production Supabase migrations are intentionally not applied from this push workflow.
# Use the "Manual Production Supabase Migration" workflow_dispatch job for DB changes.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  # Placeholders so `next build` can run without repo secrets when vars/secrets unset.
  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.ci1wbGFjZWhvbGRlcg' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check migration file names
        run: npm run check:migration-filenames

      - name: Check migration ordering (no insert-before-last)
        run: npm run check:migration-order

      - name: Schema preflight (tables + hints)
        run: npm run check:schema-preflight:strict

      - name: Audit schema vs code columns
        run: npm run check:schema-vs-code

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Prettier
        run: npm run format:check

      - name: ESLint (src/__tests__ only)
        run: npm run lint:ci

      - name: Build Next.js
        run: npm run build

  deploy-vercel:
    name: Deploy to Vercel (production)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Vercel deploy secrets
        id: vercel_secrets
        shell: bash
        run: |
          set -euo pipefail
          ok=true
          missing=()
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then ok=false; missing+=("VERCEL_TOKEN"); fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then ok=false; missing+=("VERCEL_ORG_ID"); fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then ok=false; missing+=("VERCEL_PROJECT_ID"); fi
          if [ "$ok" != "true" ]; then
            echo "::notice::Skipping Vercel deploy (missing secrets: ${missing[*]}). Configure repo secrets to enable production deploy."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Verify the token can access the configured project before attempting deploy.
          # This avoids hard failures like: {"code":"forbidden","message":"Not authorized","status":403}
          token="${{ secrets.VERCEL_TOKEN }}"
          org="${{ secrets.VERCEL_ORG_ID }}"
          project="${{ secrets.VERCEL_PROJECT_ID }}"
          url="https://api.vercel.com/v9/projects/${project}?teamId=${org}"
          code="$(curl -sS -o /tmp/vercel_project_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${token}" \
            -H "Content-Type: application/json" \
            "${url}" || true)"
          if [ "$code" != "200" ]; then
            echo "::notice::Skipping Vercel deploy (project access check HTTP ${code}). Check VERCEL_TOKEN permissions and VERCEL_ORG_ID/VERCEL_PROJECT_ID values."
            echo "::notice::Vercel response: $(head -c 400 /tmp/vercel_project_check.json || true)"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        if: ${{ steps.vercel_secrets.outputs.ok == 'true' }}
        uses: amondnet/vercel-action@v42.2.0
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          target: production
