# CI: Vitest + Prettier (full repo) + ESLint (unit tests) + Playwright + production deploy to Vercel (main only).
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#
# E2E (Playwright):
# - baseURL / webServer: Playwright starts `npm run start` (next start) and opens `E2E_BASE_URL` (default localhost).
# - Database: NOT chosen by Playwright. `NEXT_PUBLIC_SUPABASE_*` is inlined at `npm run build` time (job-level `env` below).
#   Use your *staging* Supabase URL + anon key in GitHub Actions variables/secrets so E2E hits staging, not production.
# - Seed step: `SUPABASE_PROJECT_REF` must be the *same* Supabase project as `vars.NEXT_PUBLIC_SUPABASE_URL`, or data
#   seeded in staging will not match the DB the app uses (and production must never be seeded by this job).
#
# Optional: vars.NEXT_PUBLIC_SUPABASE_URL, secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY (required for real E2E data; else placeholders)
# E2E seed (staging): secrets SUPABASE_PROJECT_REF + SUPABASE_ACCESS_TOKEN (PAT with database_write; Management API)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  # Placeholders so `next build` / Playwright can run without repo secrets (E2E may skip routes that need data).
  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://example.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.ci1wbGFjZWhvbGRlcg' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Prettier
        run: npm run format:check

      - name: ESLint (src/__tests__ only)
        run: npm run lint:ci

      - name: Install Playwright Chromium
        run: npm run test:e2e:install:ci

      - name: Build Next.js
        run: npm run build

      - name: Seed remote database for E2E (staging)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping remote seed (missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF)."
            exit 0
          fi
          node scripts/seed-supabase-remote.mjs

      - name: E2E tests (Playwright — project chromium)
        run: npm run test:e2e:ci
        env:
          CI: "true"
          NODE_ENV: production
          # Must match playwright.config.ts webServer `url` and `next start` bind (PORT).
          PORT: "3000"
          E2E_BASE_URL: "http://127.0.0.1:3000"

  deploy-vercel:
    name: Deploy to Vercel (production)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
